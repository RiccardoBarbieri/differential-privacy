# Configurazione GoDP - Epsilon 10 - Query Q2
# Q2: SUM(Salary) WHERE Department = 'Engineering' AND Gender != 'F'
# Seconda query del difference attack: esclude il genere della vittima
pipelinedp:
  configuration:
    data_dir: "experiment/data"
    input: "salaries.csv"
    output_base_name: "output/eps_10/output.csv"
    id_field: "ID"

  privacy_budget:
    noise_kind: "laplace"
    delta: 1e-5
    epsilon: 10
    aggregation_share: 0.9

  filters:
    - column: "Department"
      operator: "="
      value: "Engineering"
    - column: "Gender"
      operator: "!="
      value: "F"

  types:
    - column: "Salary"
      type: int
    - column: "Department"
      type: string
    - column: "Gender"
      type: string

  operations:
    - name: Q2
      type: sum_per_key
      column: "Salary"
      key_column: "Department"
      importance: 1
      privacy_params:
        max_categories_contributed: 1
        max_contributions_per_category: 1
        min_value: 30000
        max_value: 200000
